<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeedleForge 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0d0d0d;
  color:#fff;
}

header {
  position:sticky;
  top:0;
  background:#000;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
}

.logo {
  color:#00ffc3;
  font-weight:600;
}

.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {
  font-size:42px;
}

.hero p {
  color:#aaa;
  max-width:600px;
  margin:20px auto;
}

.btn {
  padding:14px 28px;
  border-radius:6px;
  text-decoration:none;
  margin:10px;
  font-weight:600;
  display:inline-block;
}

.primary {
  background:#00ffc3;
  color:#000;
}

.section {
  padding:60px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  margin-top:30px;
}

.card {
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
}

.calculator {
  background:#111;
  padding:30px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
}

input, select, textarea {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:5px;
  border:none;
}

button {
  padding:12px;
  background:#00ffc3;
  border:none;
  border-radius:5px;
  font-weight:600;
}

.price {
  font-size:24px;
  color:#00ffc3;
  margin-top:10px;
}

footer {
  text-align:center;
  padding:20px;
  background:#000;
}
</style>
</head>

<body>

<header>
  <div class="logo">NeedleForge 3D</div>
</header>

<section class="hero">
  <h1>Fix It. Fit It. Print It.</h1>
  <p>Custom 3D printed parts that solve everyday problems. Fast turnaround. Worcester pickup & delivery.</p>
</section>

<section class="section">
  <h2>Instant Price Estimate</h2>

  <div class="calculator">
    <label>Part Size</label>
    <select id="size">
      <option value="10">Small (clip, hook)</option>
      <option value="20">Medium (bracket, mount)</option>
      <option value="35">Large (holder, organizer)</option>
    </select>

    <label>Complexity</label>
    <select id="complexity">
      <option value="1">Simple</option>
      <option value="1.5">Moderate</option>
      <option value="2">Complex</option>
    </select>

    <label>Delivery</label>
    <select id="delivery">
      <option value="0">Pickup (Free)</option>
      <option value="8">Delivery (+$8)</option>
    </select>

    <button onclick="calculatePrice()">Estimate Price</button>

    <div class="price" id="price">$0</div>
  </div>
</section>

<section class="section">
  <h2>Request Your Print</h2>

  <form action="https://formspree.io/f/yourformid" method="POST" enctype="multipart/form-data">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>

    <textarea name="description" placeholder="Describe what you need fixed or printed" required></textarea>

    <input type="file" name="file">

    <select name="delivery">
      <option value="pickup">Pickup</option>
      <option value="delivery">Delivery</option>
    </select>

    <button type="submit">Submit Request</button>
  </form>
</section>

<section class="section">
  <h2>How It Works</h2>
  <div class="grid">
    <div class="card">Send a photo or file</div>
    <div class="card">Get a quote</div>
    <div class="card">Receive your part fast</div>
  </div>
</section>

<footer>
  © 2026 NeedleForge 3D
</footer>

<script>
function calculatePrice() {
  let size = document.getElementById("size").value;
  let complexity = document.getElementById("complexity").value;
  let delivery = document.getElementById("delivery").value;

  let price = (size * complexity) + parseInt(delivery);

  document.getElementById("price").innerText = "$" + Math.round(price);
}
</script>

</body>
</html>
